<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BotanyHub Pro</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>🌿 BotanyHub</h2>

    <input id="searchGlobal" placeholder="Buscar...">

    <button onclick="setView('resources')">Recursos</button>
    <button onclick="setView('courses')">Cursos</button>
    <button onclick="setView('jobs')">Empleo</button>

    <hr>

    <button onclick="toggleTheme()">🌓 Modo</button>
    <button onclick="showFavs()">❤️ Favoritos</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <header class="topbar">
      <h1 id="title">Recursos botánicos</h1>
    </header>

    <section id="grid" class="grid"></section>

  </main>

</div>

<script src="app.js"></script>
</body>
</html>
