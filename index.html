<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BotanyHub</title>

<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<header class="topbar">
  <a href="./" class="logo" onclick="resetAll()">BotanyHub</a>

  <div class="nav-wrapper">
    <button class="menu-toggle">☰</button>

    <nav id="nav">
      <a href="resources.html">Recursos</a>
      <a href="courses.html">Cursos</a>
      <a href="jobs.html">Empleo</a>
      <a href="citizen.html">Ciencia ciudadana</a>
      <a href="journals.html">Revistas</a>
      <a href="societies.html">Sociedades</a>
      <a href="education.html">Educación</a>
      <a href="books.html">Bibliografía</a>
      <a href="contact.html">Contacto</a>
    </nav>
  </div>
</header>

<section class="hero-video">
  <video autoplay muted loop playsinline>
    <source src="https://cdn.pixabay.com/vimeo/458987874/forest-45775.mp4" type="video/mp4">
  </video>

  <div class="hero-overlay"></div>

  <div class="hero-content">
    <h1>El hub definitivo de botánica</h1>
    <p>Explora recursos, ciencia y oportunidades</p>

    <input type="text" id="searchGlobal" placeholder="Buscar en toda la web...">
  </div>
</section>

<section class="news-section">
  <h2>Novedades</h2>

  <div class="carousel">
    <div class="carousel-track"></div>
    <button class="carousel-btn prev">‹</button>
    <button class="carousel-btn next">›</button>
    <div class="carousel-dots"></div>
  </div>
</section>

<section class="results-section hidden">
  <h2>Resultados</h2>
  <div id="results" class="grid"></div>
</section>

<script src="app.js"></script>
</body>
</html>
