<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BotanyHub</title>

<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<header class="topbar">
  <div class="logo">🌿 BotanyHub</div>
  <nav id="nav"></nav>
</header>

<section class="hero">
  <h1>El hub definitivo de recursos botánicos</h1>
  <p>Encuentra herramientas, cursos, revistas y oportunidades en segundos</p>

  <input type="text" id="searchGlobal" placeholder="Buscar recursos...">

  <div class="filters">
    <select id="filterCategory"><option value="">Categoría</option></select>
    <select id="filterLevel"><option value="">Nivel</option></select>
  </div>
</section>

<!-- CAROUSEL PREMIUM -->
<section class="news-section">
  <h2>Novedades</h2>

  <div class="carousel" id="carousel">
    <div class="carousel-track"></div>

    <button class="carousel-btn prev">‹</button>
    <button class="carousel-btn next">›</button>

    <div class="carousel-dots"></div>
  </div>
</section>

<main id="mainContent"></main>

<script src="app.js"></script>
</body>
</html>
