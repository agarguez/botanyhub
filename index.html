<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BotanyHub España</title>

<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<header class="hero">
  <div class="overlay"></div>

  <div class="hero-content">
    <h1>🌿 BotanyHub</h1>
    <p>Hub de recursos botánicos en España</p>

    <input type="text" id="searchGlobal" placeholder="Buscar recursos...">

    <div class="filters">
      <select id="filterCategory">
        <option value="">Categoría</option>
      </select>

      <select id="filterLevel">
        <option value="">Nivel</option>
      </select>
    </div>

    <nav>
      <button onclick="show('resources')">Recursos</button>
      <button onclick="show('courses')">Cursos</button>
      <button onclick="show('citizen')">Ciencia Ciudadana</button>
      <button onclick="show('journals')">Revistas</button>
      <button onclick="show('societies')">Sociedades</button>
      <button onclick="show('education')">Educación</button>
      <button onclick="show('books')">Libros</button>
      <button onclick="show('jobs')">Empleo</button>
    </nav>
  </div>
</header>

<main id="mainContent"></main>

<script src="app.js"></script>
</body>
</html>
