<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BotanyHub España</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="hero">
  <div class="overlay"></div>

  <div class="hero-content">
    <h1>BotanyHub</h1>
    <p>Explora la flora, el conocimiento y las oportunidades botánicas en España</p>

    <div class="search-bar">
      <input type="text" id="searchGlobal" placeholder="Buscar recursos, cursos o empleo...">
    </div>

    <nav>
      <button onclick="show('resources')">🌿 Recursos</button>
      <button onclick="show('courses')">🎓 Cursos</button>
      <button onclick="show('jobs')">💼 Empleo</button>
    </nav>
  </div>
</header>

<main>

<section id="resources" class="section">
  <h2>Recursos botánicos</h2>
  <div id="resourcesList" class="grid"></div>
</section>

<section id="courses" class="section hidden">
  <h2>Cursos</h2>
  <div id="coursesList" class="grid"></div>
</section>

<section id="jobs" class="section hidden">
  <h2>Empleo en botánica</h2>
  <div id="jobsList" class="grid"></div>
</section>

</main>

<!-- Botón flotante -->
<a class="floating-btn" href="#resources">⬆</a>

<script src="app.js"></script>
</body>
</html>
